<div class="container responsive-box">
    <div id="bodyLeft">
        <table id="tableLeft">
            <thead>
                <tr>
                    <th>
                        Date
                        <button (click)="sortData('date')">
                            {{ getArrow('date') }}
                        </button>
                    </th>

                    <th>
                        Message Id
                        <button (click)="sortData('messageId')">
                            {{ getArrow('messageId') }}
                        </button>
                    </th>

                    <th>
                        Message
                        <button (click)="sortData('message')">
                            {{ getArrow('message') }}
                        </button>
                    </th>
                </tr>
            </thead>

            <tbody>
                @for (message of sortedMessages; track $index) {
                <tr (click)="showMessageDetails(message.messageId)">
                    <td>{{ message.date | date:'yyyy-MM-dd HH:mm' }}</td>
                    <td>{{ message.messageId }}</td>
                    <td>{{ message.message }}</td>
                </tr>
                }
            </tbody>
        </table>
    </div>

    <div id="bodyRight">
        <table id="tableRight">
            <thead>
                <tr>
                    <th>Message Details</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="message-details">{{ messageDetail}}</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
