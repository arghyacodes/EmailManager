<div class="container responsive-box">
    <div id="bodyLeft">
        <table id="tableLeft">
            <thead>
                <tr>
                    <th class="message">Date <button (click)="sortData('date'); toggleBtn()">{{sortDir}}</button></th>
                    <th class="message">Message Id <button (click)="sortData('messageId'); toggleBtn()">{{sortDir}}</button></th>
                    <th class="message">Message <button (click)="sortData('message'); toggleBtn()">{{sortDir}}</button></th>
                </tr>
            </thead>
            <tbody>
                @for (message of sortedMessages; track $index) {
                <tr (click)="showMessageDetails(message.messageId)">
                    <td class="message">
                        {{ message.date | date:'yyyy-MM-dd HH:mm' }}
                    </td>
                    <td class="message">{{message.messageId}}</td>
                    <td class="message">{{message.message}}</td>
                </tr>
                }
            </tbody>
        </table>
    </div>
    <div id="bodyRight">
        <table id="tableRight">
            <thead>
                <tr>
                    <th class="message-details">Message Details</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="message-details">{{messageDetail}}</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
